<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Responsive Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e6e6e6;
            display: flex;
            justify-content: center; /* Horizontally center */
            align-items: center;    /* Vertically center */
            min-height: 100vh;
            padding: 20px;
        }

        .box {
            width: 100%;            /* Mobile par full width */
            max-width: 400px;       /* Baray screens par limit */
            background: #fff;
            padding: 15px;
            border-radius: 12px;    /* Thora modern look */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .img {
            width: 100%;            /* Image screen ke mutabiq adjust hogi */
            height: auto;           /* Aspect ratio kharab nahi hoga */
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="box">
        <a href="./assets/easypaisa/linke/Easypaisa.html">
            <img src="./assets/easypaisa/img/OIP (1).webp" class="img" alt="Easypaisa">
        </a>
    </div>

</body>
</html>
